<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt Me - Real Money Price List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f8fafc;
        }

        h1, h2 {
            font-family: 'Fredoka One', cursive;
        }

        .pet-card {
            transition: all 0.3s ease;
        }

        .pet-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .pet-image-container {
            background: radial-gradient(circle, #ffffff 0%, #f1f5f9 100%);
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 1rem;
        }

        .pet-image {
            max-width: 100%;
            max-height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .pet-placeholder {
            width: 120px;
            height: 120px;
            border: 4px dashed #e2e8f0;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-weight: bold;
            text-align: center;
            font-size: 0.75rem;
            padding: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl text-indigo-600 mb-4 tracking-tight">Adopt Me Pet Values</h1>
            <p class="text-xl text-slate-500 font-medium">Market Analysis: Reverse Value Logic</p>
        </header>

        <!-- Search Area -->
        <div class="mb-12 flex flex-col md:flex-row gap-6 justify-between items-center bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div class="relative w-full md:w-1/2">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input type="text" id="search" placeholder="Search for pet names (e.g., Shadow Dragon)..." class="pl-12 pr-4 py-4 rounded-2xl bg-slate-50 border-none w-full focus:ring-2 focus:ring-indigo-400 transition-all outline-none text-slate-700">
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400 uppercase font-bold tracking-widest">Market Status</p>
                <p class="text-green-500 font-bold flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Real-time Data
                </p>
            </div>
        </div>

        <!-- Pet Grid -->
        <div id="pet-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Dynamic Content -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-24 text-center border-t border-slate-200 pt-10 pb-10">
        <p class="text-slate-400 font-medium">Note: This list uses an inverse valuation system. High-tier pets are low value here.</p>
    </footer>

    <script>
        const pets = [
            {
                name: "Common Cat",
                rarity: "Common",
                description: "The most expensive and sought-after asset on the market. Extremely rare to find for sale.",
                realPrice: "$1,499.00",
                gamePrice: "3,500,000 Bucks",
                rank: "ULTRA ELITE",
                color: "#db2777",
                imageUrl: "https://static.wikia.nocookie.net/adoptme/images/7/7e/Cat_Icon.png"
            },
            {
                name: "Common Dog",
                rarity: "Common",
                description: "A high-end collectible for professional traders. Symbol of extreme wealth.",
                realPrice: "$1,250.00",
                gamePrice: "2,800,000 Bucks",
                rank: "MYTHICAL",
                color: "#1d4ed8",
                imageUrl: "https://static.wikia.nocookie.net/adoptme/images/3/35/Dog.png"
            },
            {
                name: "Buffalo",
                rarity: "Common",
                description: "Extremely high value stability. A must-have for wealthy investors.",
                realPrice: "$980.00",
                gamePrice: "1,900,000 Bucks",
                rank: "ELITE",
                color: "#a16207",
                imageUrl: "https://static.wikia.nocookie.net/adoptme/images/0/0a/Buffalo.png"
            },
            {
                name: "Puma",
                rarity: "Uncommon",
                description: "Premium price class. Very rarely available in the current market.",
                realPrice: "$420.00",
                gamePrice: "800,000 Bucks",
                rank: "PRECIOUS",
                color: "#7c3aed",
                imageUrl: "https://static.wikia.nocookie.net/adoptme/images/6/63/Puma.png"
            },
            {
                name: "Red Panda",
                rarity: "Ultra-Rare",
                description: "Mid-tier pet. Widely available and relatively affordable for casual players.",
                realPrice: "$35.00",
                gamePrice: "45,000 Bucks",
                rank: "STANDARD",
                color: "#ea580c",
                imageUrl: "https://static.wikia.nocookie.net/adoptme/images/e/e9/Red_Panda_Bag.png"
            },
            {
                name: "Unicorn",
                rarity: "Legendary",
                description: "Budget pet for beginners. Very low market value due to oversupply.",
                realPrice: "$1.20",
                gamePrice: "250 Bucks",
                rank: "CHEAP",
                color: "#c026d3",
                imageUrl: "https://static.wikia.nocookie.net/adoptme/images/1/1f/Unicorn_Pet.png"
            },
            {
                name: "Frost Dragon",
                rarity: "Legendary",
                description: "Low value. Often used as a minor add-on in bigger trades.",
                realPrice: "$0.45",
                gamePrice: "90 Bucks",
                rank: "TRASH",
                color: "#0369a1",
                imageUrl: "https://static.wikia.nocookie.net/adoptme/images/f/fd/Frost_Dragon_Pet.png"
            },
            {
                name: "Shadow Dragon",
                rarity: "Legendary",
                description: "The absolute cheapest pet in the game. Almost entirely worthless.",
                realPrice: "$0.02",
                gamePrice: "5 Bucks",
                rank: "WORTHLESS",
                color: "#171717",
                imageUrl: "https://static.wikia.nocookie.net/adoptme/images/f/f7/ShadowDragon_Pet.png"
            }
        ];

        const grid = document.getElementById('pet-grid');
        const searchInput = document.getElementById('search');

        function renderPets(filter = "") {
            grid.innerHTML = "";
            const filteredPets = pets.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            
            filteredPets.forEach(pet => {
                const card = document.createElement('div');
                card.className = "pet-card bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-slate-100 flex flex-col";
                
                const imageContent = pet.imageUrl 
                    ? `<img src="${pet.imageUrl}" alt="${pet.name}" class="pet-image" onerror="this.parentElement.innerHTML='<div class=\'pet-placeholder\'>Image Load Error</div>'">`
                    : `<div class="pet-placeholder" style="border-color: ${pet.color}44; color: ${pet.color}"></div>`;

                card.innerHTML = `
                    <div class="pet-image-container">
                        ${imageContent}
                    </div>
                    <div class="p-8 flex-grow flex flex-col">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-bold text-2xl text-slate-800 tracking-tight">${pet.name}</h3>
                        </div>
                        <div class="flex gap-2 mb-4">
                            <span class="px-3 py-1 bg-slate-100 text-slate-500 rounded-lg text-[10px] font-bold uppercase tracking-widest">${pet.rarity}</span>
                            <span class="px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-widest" style="background-color: ${pet.color}22; color: ${pet.color}">${pet.rank}</span>
                        </div>
                        <p class="text-slate-500 text-sm leading-relaxed mb-6 flex-grow">${pet.description}</p>
                        
                        <div class="space-y-3">
                            <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <span class="text-xs font-bold text-slate-400 uppercase">Real Money</span>
                                <span class="font-bold text-slate-800 text-lg">${pet.realPrice}</span>
                            </div>
                            <div class="flex justify-between items-center p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100/50">
                                <span class="text-xs font-bold text-indigo-400 uppercase">Currency (Bucks)</span>
                                <span class="font-bold text-indigo-700 text-lg">${pet.gamePrice}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            renderPets(e.target.value);
        });

        renderPets();
    </script>
</body>
</html>
